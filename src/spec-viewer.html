<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EaglerFine Spec Viewer</title>
    <style>
      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #111827;
        color: #e5e7eb;
      }
      .wrap {
        max-width: 1100px;
        margin: 0 auto;
        padding: 24px;
      }
      .card {
        background: #1f2937;
        border: 1px solid #374151;
        border-radius: 10px;
        padding: 16px;
        margin-bottom: 16px;
      }
      .ok { color: #34d399; }
      .bad { color: #f87171; }
      pre {
        white-space: pre-wrap;
        word-break: break-word;
        background: #0b1220;
        border: 1px solid #243042;
        border-radius: 8px;
        padding: 14px;
        overflow: auto;
      }
      a { color: #93c5fd; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>EaglerFine v12.2 Spec Viewer</h1>

      <div class="card">
        <strong>Self-Test:</strong>
        <span id="status">Running…</span>
        <div id="details"></div>
      </div>

      <div class="card">
        <strong>Spec JSON</strong>
        <pre id="output">Loading…</pre>
      </div>
    </div>

    <script type="module">
      import {
        eaglerFineSpecV122,
        runEaglerFineSpecSelfTest
      } from '../docs/EaglerFine-Design-Spec-v12.2.js';

      const status = document.getElementById('status');
      const details = document.getElementById('details');
      const output = document.getElementById('output');

      try {
        const result = runEaglerFineSpecSelfTest();
        status.className = 'ok';
        status.textContent = 'PASS';
        details.textContent = `Checked keys: ${result.checkedKeys} | Version: ${result.version}`;
      } catch (err) {
        status.className = 'bad';
        status.textContent = 'FAIL';
        details.textContent = err?.message || String(err);
      }

      output.textContent = JSON.stringify(eaglerFineSpecV122, null, 2);
    </script>
  </body>
</html>
